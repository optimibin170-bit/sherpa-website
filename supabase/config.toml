# Supabase Project Configuration
# Replace with your actual Supabase project ID before deployment
# Find it at: https://supabase.com/dashboard → Project Settings → General
project_id = "betlxixoaztlfvatdjza"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

# Edge Function: chat-assistant
# Set these secrets via: supabase secrets set AI_API_KEY=xxx ALLOWED_ORIGIN=https://your-domain.com AI_MODEL=gpt-4o
# [functions.chat-assistant]
# verify_jwt = false
